name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myoflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Setup environment
        run: |
          cp .env.example .env
          echo "ENCRYPTION_KEY_B64=$(openssl rand -base64 32)" >> .env
          echo "INTAKE_TOKEN_SECRET=$(openssl rand -hex 32)" >> .env
          echo "NEXTAUTH_SECRET=$(openssl rand -hex 32)" >> .env
          # Setup web app environment
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/myoflow" > apps/web/.env
          echo "NEXTAUTH_URL=http://localhost:3000" >> apps/web/.env
          echo "NEXTAUTH_SECRET=$(openssl rand -hex 32)" >> apps/web/.env

      - name: Generate Prisma client
        run: pnpm --filter @myoflow/db prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/myoflow

      - name: Run database migrations
        run: pnpm --filter @myoflow/db prisma migrate dev --name init
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/myoflow

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:run

      - name: Run E2E tests
        run: pnpm test:e2e
        if: false # TODO-CLAUDE: Enable once Playwright tests are written