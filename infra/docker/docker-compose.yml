version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: myoflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: myoflow
      POSTGRES_USER: myoflow
      POSTGRES_PASSWORD: myoflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myoflow -d myoflow"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myoflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data: